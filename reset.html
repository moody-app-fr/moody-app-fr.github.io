<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser mon mot de passe — Moudie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #E8E0F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #25243a;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    h1 { font-size: 20px; text-align: center; margin-bottom: 24px; font-weight: 600; }
    label { display: block; font-size: 14px; color: #B8A8D0; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: #1a1a2e;
      color: #E8E0F5;
      font-size: 16px;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #8B5CF6; }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { font-size: 12px; color: #7B6FA0; margin-bottom: 16px; line-height: 1.5; }
    .message { padding: 14px; border-radius: 12px; margin-bottom: 16px; font-size: 14px; text-align: center; display: none; }
    .message.success { background: rgba(34, 197, 94, 0.15); color: #22C55E; display: block; }
    .message.error { background: rgba(239, 68, 68, 0.15); color: #EF4444; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Moudie</div>
    <h1>Nouveau mot de passe</h1>

    <div id="message" class="message"></div>

    <div id="form-section">
      <label for="password">Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">

      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">

      <p class="hint">Au moins 8 caractères, une majuscule et un chiffre.</p>

      <button id="submit-btn" onclick="resetPassword()">Réinitialiser</button>
    </div>
  </div>

  <script>
    const API = 'https://moody-backend.osc-fr1.scalingo.io/api';

    // Récupérer le token depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const messageEl = document.getElementById('message');
    const formSection = document.getElementById('form-section');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    // Si pas de token, afficher une erreur d'emblée
    if (!token) {
      showMessage('Lien invalide. Veuillez refaire une demande depuis l\'application.', 'error');
      formSection.style.display = 'none';
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');

      // Validations côté client
      if (!password || !confirm) {
        showMessage('Veuillez remplir les deux champs.', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Les deux mots de passe ne correspondent pas.', 'error');
        return;
      }
      if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
        showMessage('Le mot de passe doit faire au moins 8 caractères, avec une majuscule et un chiffre.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Réinitialisation...';

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (data.success) {
          showMessage('Mot de passe réinitialisé ! Vous pouvez maintenant vous connecter dans l\'application Moudie.', 'success');
          formSection.style.display = 'none';
        } else {
          showMessage(data.message || 'Une erreur est survenue.', 'error');
          btn.disabled = false;
          btn.textContent = 'Réinitialiser';
        }
      } catch (e) {
        showMessage('Impossible de contacter le serveur. Réessayez plus tard.', 'error');
        btn.disabled = false;
        btn.textContent = 'Réinitialiser';
      }
    }
  </script>
</body>
</html>
